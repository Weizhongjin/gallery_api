services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: cloth_gallery
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  embedding-svc:
    build:
      context: ./embedding-svc
    container_name: cloth-gallery-embedding-svc
    profiles: ["ai"]
    restart: unless-stopped
    ports:
      - "${EMBED_PORT:-7997}:7997"
    volumes:
      - embedding_models:/app/models
    environment:
      HF_HOME: /app/models
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7997/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

volumes:
  pg_data:
  minio_data:
  embedding_models:
